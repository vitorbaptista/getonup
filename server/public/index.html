<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>getonup — published artifacts</title>
    <meta name="description" content="Every web artifact published to this getonup instance — auto-generated, newest first, each a live URL." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      :root { --bg:#0b0d10; --panel:rgba(255,255,255,.025); --ink:#e7e9ee; --muted:#9aa0ab; --faint:#6b7280; --line:#232830; --violet:#7c5cff; --cyan:#22d3ee; }
      * { box-sizing: border-box; }
      body { margin:0; background:var(--bg); color:var(--ink); line-height:1.55; font-family:"Plus Jakarta Sans",system-ui,sans-serif; -webkit-font-smoothing:antialiased;
        background-image: radial-gradient(900px 480px at 85% -8%, rgba(124,92,255,.16), transparent 60%), radial-gradient(760px 420px at -5% 4%, rgba(34,211,238,.10), transparent 55%); min-height:100vh; }
      .wrap { max-width:880px; margin:0 auto; padding:64px 24px 96px; }
      .mono { font-family:"JetBrains Mono",ui-monospace,monospace; }
      a { color:inherit; }
      .badge { display:inline-flex; align-items:center; gap:8px; padding:6px 13px; border:1px solid var(--line); border-radius:999px; background:var(--panel); color:var(--muted); font-size:13px; }
      .badge .dot { width:7px; height:7px; border-radius:50%; background:var(--cyan); box-shadow:0 0 10px var(--cyan); }
      h1 { font-size:clamp(30px,5vw,48px); letter-spacing:-.03em; margin:20px 0 12px; font-weight:800; }
      h1 .grad { background:linear-gradient(100deg,var(--violet),#b39bff 45%,var(--cyan)); -webkit-background-clip:text; background-clip:text; color:transparent; }
      .lede { color:var(--muted); max-width:64ch; font-size:clamp(15px,2vw,17px); margin:0 0 6px; }
      .lede code { background:#1a1e24; border:1px solid var(--line); border-radius:6px; padding:1px 6px; font-size:.9em; color:#cfd3da; }
      .total { color:var(--faint); font-size:13px; margin-top:14px; }

      .month { display:flex; align-items:baseline; gap:12px; margin:46px 0 8px; }
      .month h2 { font-size:14px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--muted); margin:0; }
      .month .rule { flex:1; height:1px; background:var(--line); }
      .month .count { color:var(--faint); font-size:13px; }

      ul.rows { list-style:none; margin:0; padding:0; }
      .row { display:grid; grid-template-columns:1fr auto; gap:2px 16px; align-items:baseline; padding:14px 4px; border-bottom:1px solid var(--line); }
      .row:hover { background:linear-gradient(90deg, rgba(124,92,255,.06), transparent 70%); }
      .row .t { grid-column:1; font-size:16px; font-weight:600; text-decoration:none; color:var(--ink); }
      .row .t:hover { color:var(--cyan); }
      .row .t.untitled { color:var(--muted); font-style:italic; }
      .row .when { grid-column:2; grid-row:1; text-align:right; color:var(--faint); font-size:12.5px; white-space:nowrap; }
      .row .when .id { color:var(--violet); }
      .row .d { grid-column:1 / -1; grid-row:2; margin:0; color:var(--muted); font-size:13.5px; }
      .row .d.synth { color:var(--faint); }

      .note { margin-top:40px; color:var(--muted); font-size:15px; }
      .note code { background:#1a1e24; border:1px solid var(--line); border-radius:6px; padding:2px 7px; }
      footer { margin-top:60px; color:var(--faint); font-size:13px; border-top:1px solid var(--line); padding-top:22px; }
      footer a { color:var(--muted); text-decoration:none; }
      footer a:hover { color:var(--cyan); }
    </style>
  </head>
  <body>
    <main class="wrap">
      <span class="badge"><span class="dot"></span> live · auto-generated</span>
      <h1>Published on <span class="grad">getonup</span></h1>
      <p class="lede">Every artifact deployed to this instance, newest first. Publish your own with
        <code>getonup deploy &lt;file&gt;</code> — it lands here automatically.</p>
      <p class="total mono" id="total"></p>

      <div id="app"><p class="note" id="status">Loading…</p></div>

      <footer>
        getonup · MIT · self-hosted · scale-to-zero —
        <a href="https://github.com/vitorbaptista/getonup">source</a>
      </footer>
    </main>

    <script>
      const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      const SHORT  = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      const ID_RE = /^[a-z0-9-]+$/;

      function fmtBytes(n) {
        if (typeof n !== "number" || !isFinite(n) || n < 0) return "";
        if (n < 1024) return n + " B";
        if (n < 1024 * 1024) return Math.round(n / 1024) + " KB";
        return (n / (1024 * 1024)).toFixed(1) + " MB";
      }
      // "<type> · <size>" synthesized line for deploys that carry no real description.
      function synth(d) {
        const size = fmtBytes(d.bytes);
        return [d.type || "static", size].filter(Boolean).join(" · ");
      }
      function parsed(iso) {
        const t = iso ? new Date(iso) : null;
        return t && !isNaN(t.getTime()) ? t : null;
      }
      function el(tag, cls, text) {
        const n = document.createElement(tag);
        if (cls) n.className = cls;
        if (text != null) n.textContent = text; // textContent: titles/descriptions are untrusted
        return n;
      }

      function render(deploys) {
        const app = document.getElementById("app");
        app.textContent = "";
        document.getElementById("total").textContent =
          deploys.length + (deploys.length === 1 ? " artifact" : " artifacts");

        if (!deploys.length) {
          const p = el("p", "note");
          p.append("Nothing deployed yet. Publish one with ");
          p.append(el("code", null, "getonup deploy <file>"));
          p.append(".");
          app.append(p);
          return;
        }

        const groups = new Map();
        for (const d of deploys) {
          const t = parsed(d.created_at);
          const key = t ? t.getUTCFullYear() + "-" + t.getUTCMonth() : "undated";
          if (!groups.has(key)) groups.set(key, { t, items: [] });
          groups.get(key).items.push(d);
        }

        // Don't rely on the API's sort order: order months newest-first (undated last) and sort
        // each month's rows by date descending, all client-side.
        const rank = (g) => (g.t ? g.t.getUTCFullYear() * 12 + g.t.getUTCMonth() : -Infinity);
        const ordered = [...groups.values()].sort((a, b) => rank(b) - rank(a));
        for (const g of ordered) {
          g.items.sort((a, b) => String(b.created_at || "").localeCompare(String(a.created_at || "")));
        }

        for (const { t, items } of ordered) {
          const head = el("div", "month");
          head.append(el("h2", null, t ? MONTHS[t.getUTCMonth()] + " " + t.getUTCFullYear() : "Undated"));
          head.append(el("span", "rule"));
          head.append(el("span", "count", String(items.length)));
          app.append(head);

          const ul = el("ul", "rows");
          for (const d of items) ul.append(row(d));
          app.append(ul);
        }
      }

      function row(d) {
        const li = el("li", "row");
        const id = typeof d.id === "string" && ID_RE.test(d.id) ? d.id : null;
        const title = (d.title || "").trim();
        const label = title || id || "(untitled)";

        // Title → live artifact when we have a valid id; otherwise plain text.
        const titleEl = id ? el("a", "t", label) : el("span", "t", label);
        if (id) titleEl.href = "/s/" + id;
        if (!title && !id) titleEl.classList.add("untitled");
        li.append(titleEl);

        const when = el("span", "when");
        const t = parsed(d.created_at);
        if (t) when.append(el("span", null, SHORT[t.getUTCMonth()] + " " + t.getUTCDate()));
        // Show the id chip only when a title is the visible label (else the link already shows the id).
        if (id && title) { if (t) when.append(document.createTextNode(" · ")); when.append(el("span", "id mono", id)); }
        li.append(when);

        const desc = (d.description || "").trim();
        li.append(el("p", "d" + (desc ? "" : " synth"), desc || synth(d)));
        return li;
      }

      fetch("/api/index", { headers: { accept: "application/json" } })
        .then((r) => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
        .then((data) => render(Array.isArray(data && data.deploys) ? data.deploys : []))
        .catch(() => {
          document.getElementById("app").innerHTML =
            '<p class="note">Couldn’t load the index. Try reloading.</p>';
        });
    </script>
  </body>
</html>
