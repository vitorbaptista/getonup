name: Publish to npm

# Publishes the `getonup` CLI to npm whenever a GitHub Release is published.
# Create a release whose tag matches the cli version (e.g. tag `v0.1.0` for
# cli/package.json version 0.1.0) and this workflow does the rest.
#
# Auth is via npm Trusted Publishing (OIDC) — no NPM_TOKEN secret. Configure a
# trusted publisher for the `getonup` package on npmjs.com pointing at this repo
# and this workflow file (.github/workflows/publish.yml). The package must be
# published once manually first; trusted publishing only covers later versions.

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance + trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      # OIDC trusted publishing needs npm >= 11.5; Node 22 bundles npm 10.
      - name: Update npm
        run: npm install -g npm@latest

      - run: npm install

      - name: Verify release tag matches cli version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./cli/package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Release tag ($tag) does not match cli/package.json version ($pkg)."
            exit 1
          fi

      - name: Build the CLI bundle
        run: npm run build --workspace cli

      - name: Publish to npm
        run: npm publish --workspace cli --access public --provenance
