name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - name: Typecheck (cli + server)
        run: npm run typecheck
      - name: Test (cli)
        run: npm test
      - name: Build the CLI bundle
        run: npm run build --workspace cli
